<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Delay Rate Taxi-out</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f4f4; }
    h1 { margin-bottom: 2rem; }
    .summary-box {
      background: #fff; padding: 1rem 2rem; border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 1.2rem;
      margin-top: 2rem;
    }
    table { border-collapse: collapse; margin-top: 2rem; background: white; width: 100%; }
    th, td { padding: 0.5rem; border: 1px solid #ccc; text-align: center; }
    th { background: #eee; }
    .form-group { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>🛫 Delay Rate Taxi-out (Pushback ➝ ATD)</h1>

  <form method="get">
    <div class="form-group">
      <label><b>📅 Bulan:</b></label>
      <select name="bulan">
        <option value="">-- Semua Bulan --</option>
        {% for b in available_months %}
          <option value="{{ b }}" {% if b == selected_month %}selected{% endif %}>{{ b }}</option>
        {% endfor %}
      </select>

      <label><b>🌐 Jenis:</b></label>
      <select name="jenis">
        <option value="" {% if jenis == "" %}selected{% endif %}>Gabungan</option>
        <option value="domestik" {% if jenis == "domestik" %}selected{% endif %}>Domestik</option>
        <option value="internasional" {% if jenis == "internasional" %}selected{% endif %}>Internasional</option>
      </select>

      <label><b>✈️ Maskapai:</b></label>
      <select name="icao">
        <option value="">Semua</option>
        {% for icao, nama in available_icaos %}
          <option value="{{ icao }}" {% if icao == selected_icao %}selected{% endif %}>{{ nama }}</option>
        {% endfor %}
      </select>

      <label><b>📍 Tujuan:</b></label>
      <select name="tujuan">
        <option value="">Semua</option>
        {% for icao, nama in available_destinations %}
          <option value="{{ icao }}" {% if icao == selected_destination %}selected{% endif %}>{{ nama }}</option>
        {% endfor %}
      </select>

      <button type="submit">Tampilkan</button>
    </div>
  </form>

  <div class="summary-box">
    <p><b>Total Flight:</b> {{ total_flight }}</p>
    <p><b>Ontime (≤15m):</b> {{ ontime }} flight ({{ ontime_rate }}%)</p>
    <p><b>Delay (>15m):</b> {{ delay }} flight ({{ delay_rate }}%)</p>
    <p><b>Rata-rata Taxi-out Time:</b> {{ avg_taxi }} menit</p>
  </div>
</body>
</html>
